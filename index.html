<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowStock Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>KnowStock Bot</h1>
      <p class="note">部門単位での業務・商品・販売・利益計算・経理関連・人事評価など、何でもお気軽にご質問ください</p>
    </header>

    <div id="chat" class="chat-window"></div>

    <form id="form" class="input-area">
      <textarea
        id="question"
        placeholder="質問を入力してください（センシティブ情報は入力しないでください）"
        rows="2"
        required
      ></textarea>
      <button type="submit" id="send">送信</button>
    </form>

    <p class="warning">
      企業名・個人情報・サービス名などの機密情報は入力しないでください。
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
